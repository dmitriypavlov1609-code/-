<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Starfront Mobile RTS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hud top-bar">
      <div class="stat"><span class="label">💎 Минералы</span><span id="minerals">0</span></div>
      <div class="stat"><span class="label">👥 Лимит</span><span id="supply">0/0</span></div>
      <div class="stat"><span class="label">⚠️ Враги</span><span id="enemyCount">0</span></div>
    </div>

    <canvas id="gameCanvas" width="1024" height="640"></canvas>
    <div id="statusBanner" class="status-banner"></div>

    <div class="hud panel">
      <div class="panel-title" id="selectionTitle">Ничего не выбрано</div>
      <div class="actions" id="actions"></div>
      <div class="hint">Тап: выбрать/приказать • Потянуть: сдвиг камеры</div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
